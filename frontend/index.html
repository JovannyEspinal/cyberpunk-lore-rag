<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETWATCH // LORE TERMINAL v2.077</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0008;
    --panel-bg: #0d000a;
    --border: #ff0040;
    --accent: #ff0040;
    --cyan: #00eaff;
    --text: #c0c0c0;
    --text-bright: #e0e0e0;
    --dim: #503040;
    --glow-pink: 0 0 8px rgba(255, 0, 64, 0.4);
    --glow-cyan: 0 0 8px rgba(0, 234, 255, 0.3);
    --font: 'Share Tech Mono', monospace;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* === SCANLINES === */
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
  }

  /* === SCREEN FLICKER === */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  body {
    animation: flicker 8s infinite;
  }

  /* === LAYOUT === */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* === HEADER === */
  .header {
    border: 1px solid var(--border);
    padding: 12px 20px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--glow-pink);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 0, 64, 0.03), transparent);
    animation: headerSweep 6s ease-in-out infinite;
  }

  @keyframes headerSweep {
    0% { left: -100%; }
    50% { left: 100%; }
    100% { left: 100%; }
  }

  .header-title {
    color: var(--accent);
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .header-version {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
  }

  /* === SECTION HEADERS === */
  .section-header {
    color: var(--accent);
    text-align: center;
    font-size: 14px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  /* === INPUT AREA === */
  .input-section {
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
    background: var(--panel-bg);
    box-shadow: var(--glow-pink);
  }

  .prompt-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .prompt-prefix {
    color: var(--cyan);
    white-space: nowrap;
    font-size: 13px;
  }

  .prompt-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: var(--font);
    font-size: 13px;
    caret-color: var(--cyan);
  }

  .prompt-input::placeholder {
    color: var(--dim);
  }

  .cursor-blink {
    color: var(--cyan);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* === QUESTION PILLS === */
  .pills-label {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .pills-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .pill {
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: var(--font);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .pill::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: var(--accent);
    transition: left 0.3s ease;
    z-index: 0;
  }

  .pill:hover::before {
    left: 0;
  }

  .pill:hover {
    color: var(--bg);
  }

  .pill span {
    position: relative;
    z-index: 1;
  }

  /* === API KEY ROW === */
  .api-key-row {
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
    margin-bottom: 0;
  }

  .api-key-row.visible {
    max-height: 60px;
    opacity: 1;
    margin-bottom: 16px;
  }

  .api-key-label {
    color: var(--cyan);
    white-space: nowrap;
    font-size: 12px;
  }

  .api-key-input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--dim);
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 10px;
    transition: border-color 0.3s ease;
  }

  .api-key-input:focus {
    border-color: var(--cyan);
    box-shadow: var(--glow-cyan);
  }

  /* === SUBMIT BUTTON === */
  .submit-row {
    display: flex;
    justify-content: flex-end;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease 0.1s, opacity 0.4s ease 0.1s;
  }

  .submit-row.visible {
    max-height: 50px;
    opacity: 1;
  }

  .submit-btn {
    border: 1px solid var(--cyan);
    background: transparent;
    color: var(--cyan);
    font-family: var(--font);
    font-size: 12px;
    padding: 8px 30px;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: var(--cyan);
    transition: left 0.3s ease;
    z-index: 0;
  }

  .submit-btn:hover::before {
    left: 0;
  }

  .submit-btn:hover {
    color: var(--bg);
  }

  .submit-btn span {
    position: relative;
    z-index: 1;
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .submit-btn:disabled:hover::before {
    left: -100%;
  }

  .submit-btn:disabled:hover {
    color: var(--cyan);
  }

  /* === RESPONSE PANELS === */
  .response-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .response-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .response-panel {
    border: 1px solid var(--border);
    background: var(--panel-bg);
    min-height: 300px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .response-panel.rag-panel {
    border-color: var(--cyan);
    box-shadow: var(--glow-cyan);
  }

  .response-panel.raw-panel {
    box-shadow: var(--glow-pink);
  }

  .panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .raw-panel .panel-header {
    border-color: var(--border);
    color: var(--accent);
  }

  .rag-panel .panel-header {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .panel-tag {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid;
    letter-spacing: 1px;
  }

  .raw-panel .panel-tag {
    border-color: var(--accent);
    color: var(--accent);
  }

  .rag-panel .panel-tag {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .panel-content {
    padding: 16px;
    flex: 1;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .panel-content::-webkit-scrollbar {
    width: 4px;
  }

  .panel-content::-webkit-scrollbar-track {
    background: var(--bg);
  }

  .panel-content::-webkit-scrollbar-thumb {
    background: var(--dim);
  }

  /* === TYPING CURSOR IN PANELS === */
  .typing-cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--cyan);
    animation: blink 0.6s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  .raw-panel .typing-cursor {
    background: var(--accent);
  }

  /* === STATUS BAR === */
  .panel-status {
    padding: 6px 16px;
    border-top: 1px solid;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  .raw-panel .panel-status {
    border-color: var(--border);
    color: var(--dim);
  }

  .rag-panel .panel-status {
    border-color: var(--cyan);
    color: var(--dim);
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-idle .status-dot { background: var(--dim); }
  .status-streaming .status-dot {
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    animation: pulse 1s ease infinite;
  }
  .status-done .status-dot { background: #00ff88; }
  .status-error .status-dot { background: var(--accent); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* === FOOTER === */
  .footer {
    border: 1px solid var(--border);
    padding: 10px 20px;
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    box-shadow: var(--glow-pink);
  }

  .footer-accent {
    color: var(--accent);
  }

  /* === GLITCH TITLE === */
  @keyframes glitch1 {
    0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    20% { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 0); }
    40% { clip-path: inset(50% 0 20% 0); transform: translate(3px, 0); }
    60% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 0); }
    80% { clip-path: inset(80% 0 5% 0); transform: translate(1px, 0); }
  }

  .glitch {
    position: relative;
  }

  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .glitch::before {
    color: var(--cyan);
    animation: glitch1 4s infinite linear alternate-reverse;
    z-index: -1;
  }

  .glitch::after {
    color: var(--accent);
    animation: glitch1 3s infinite linear alternate;
    z-index: -1;
  }

  /* === LOADING ANIMATION === */
  .loading-text {
    color: var(--dim);
    font-size: 12px;
  }

  .loading-text::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* === FADE IN ANIMATION === */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(15px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .fade-in {
    animation: fadeInUp 0.5s ease forwards;
  }

  .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header fade-in">
    <div class="header-title glitch" data-text="NETWATCH // LORE TERMINAL">NETWATCH // LORE TERMINAL</div>
    <div class="header-version">v2.077 // RAG comparison protocol</div>
  </div>

  <!-- INPUT SECTION -->
  <div class="input-section fade-in fade-in-delay-1">
    <div class="section-header">=== query interface ===</div>

    <!-- Command Line Input -->
    <div class="prompt-line">
      <span class="prompt-prefix">guest@nightcity:~$</span>
      <input
        type="text"
        class="prompt-input"
        id="questionInput"
        placeholder="type your query here..."
        autocomplete="off"
      >
      <span class="cursor-blink">_</span>
    </div>

    <!-- Question Pills -->
    <div class="pills-label">// quickjack queries</div>
    <div class="pills-container" id="pillsContainer"></div>

    <!-- API Key (hidden until question populated) -->
    <div class="api-key-row" id="apiKeyRow">
      <span class="api-key-label">API_KEY:</span>
      <input
        type="password"
        class="api-key-input"
        id="apiKeyInput"
        placeholder="sk-..."
        autocomplete="off"
      >
    </div>

    <!-- Submit (hidden until question populated) -->
    <div class="submit-row" id="submitRow">
      <button class="submit-btn" id="submitBtn" disabled>
        <span>[ EXECUTE ]</span>
      </button>
    </div>
  </div>

  <!-- RESPONSE PANELS -->
  <div class="response-section" id="responseSection">

    <!-- LEFT: GPT Raw -->
    <div class="response-panel raw-panel">
      <div class="panel-header">
        <span>GPT-4o Raw</span>
        <span class="panel-tag">training data</span>
      </div>
      <div class="panel-content" id="rawContent">
        <span class="loading-text" id="rawLoading" style="display:none">querying neural network</span>
      </div>
      <div class="panel-status status-idle" id="rawStatus">
        <span><span class="status-dot"></span>idle</span>
        <span id="rawChars"></span>
      </div>
    </div>

    <!-- RIGHT: RAG -->
    <div class="response-panel rag-panel">
      <div class="panel-header">
        <span>RAG // Lore DB</span>
        <span class="panel-tag">lore book</span>
      </div>
      <div class="panel-content" id="ragContent">
        <span class="loading-text" id="ragLoading" style="display:none">searching lore database</span>
      </div>
      <div class="panel-status status-idle" id="ragStatus">
        <span><span class="status-dot"></span>idle</span>
        <span id="ragChars"></span>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer fade-in fade-in-delay-3">
    <span class="footer-accent">/</span> powered by chromadb
    <span class="footer-accent">/|\</span> protected by netwatch
    <span class="footer-accent">\</span>
  </div>

</div>

<script>
const API_BASE = 'http://localhost:8000';

const questionInput = document.getElementById('questionInput');
const apiKeyInput = document.getElementById('apiKeyInput');
const apiKeyRow = document.getElementById('apiKeyRow');
const submitRow = document.getElementById('submitRow');
const submitBtn = document.getElementById('submitBtn');
const responseSection = document.getElementById('responseSection');
const rawContent = document.getElementById('rawContent');
const ragContent = document.getElementById('ragContent');
const rawLoading = document.getElementById('rawLoading');
const ragLoading = document.getElementById('ragLoading');
const rawStatus = document.getElementById('rawStatus');
const ragStatus = document.getElementById('ragStatus');
const rawChars = document.getElementById('rawChars');
const ragChars = document.getElementById('ragChars');
const pillsContainer = document.getElementById('pillsContainer');

// ── Load predefined questions ────────────────────────────────────────────
async function loadQuestions() {
  try {
    const res = await fetch(`${API_BASE}/questions`);
    const data = await res.json();
    data.questions.forEach(q => {
      const pill = document.createElement('button');
      pill.className = 'pill';
      pill.innerHTML = `<span>${q}</span>`;
      pill.addEventListener('click', () => {
        questionInput.value = q;
        questionInput.dispatchEvent(new Event('input'));
        questionInput.focus();
      });
      pillsContainer.appendChild(pill);
    });
  } catch (e) {
    console.error('Failed to load questions:', e);
  }
}

// ── Show/hide API key + submit based on input ────────────────────────────
questionInput.addEventListener('input', () => {
  const hasText = questionInput.value.trim().length > 0;
  apiKeyRow.classList.toggle('visible', hasText);
  submitRow.classList.toggle('visible', hasText);
  updateSubmitState();
});

apiKeyInput.addEventListener('input', updateSubmitState);

function updateSubmitState() {
  const hasQuestion = questionInput.value.trim().length > 0;
  const hasKey = apiKeyInput.value.trim().length > 0;
  submitBtn.disabled = !(hasQuestion && hasKey);
}

// ── Submit handler ───────────────────────────────────────────────────────
submitBtn.addEventListener('click', executeQuery);
questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !submitBtn.disabled) executeQuery();
});

async function executeQuery() {
  const question = questionInput.value.trim();
  const apiKey = apiKeyInput.value.trim();

  if (!question || !apiKey) return;

  // Show response section
  responseSection.classList.add('visible');

  // Reset panels
  rawContent.textContent = '';
  ragContent.textContent = '';
  rawLoading.style.display = 'inline';
  ragLoading.style.display = 'inline';
  rawChars.textContent = '';
  ragChars.textContent = '';

  // Update status
  setStatus(rawStatus, 'streaming');
  setStatus(ragStatus, 'streaming');

  // Disable submit during streaming
  submitBtn.disabled = true;

  // Stream both in parallel
  const body = JSON.stringify({ question, api_key: apiKey });
  const headers = { 'Content-Type': 'application/json' };

  await Promise.all([
    streamResponse(`${API_BASE}/generate/raw`, body, headers, rawContent, rawLoading, rawStatus, rawChars),
    streamResponse(`${API_BASE}/generate/rag`, body, headers, ragContent, ragLoading, ragStatus, ragChars)
  ]);

  submitBtn.disabled = false;
  updateSubmitState();
}

// ── Stream a response into a panel ───────────────────────────────────────
async function streamResponse(url, body, headers, contentEl, loadingEl, statusEl, charsEl) {
  try {
    const res = await fetch(url, { method: 'POST', headers, body });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    loadingEl.style.display = 'none';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    // Add typing cursor
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    contentEl.appendChild(cursor);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      fullText += chunk;

      // Insert text before cursor
      const textNode = document.createTextNode(chunk);
      contentEl.insertBefore(textNode, cursor);

      // Update char count
      charsEl.textContent = `${fullText.length} chars`;

      // Auto-scroll
      contentEl.scrollTop = contentEl.scrollHeight;
    }

    // Remove cursor when done
    cursor.remove();
    setStatus(statusEl, 'done');

  } catch (e) {
    loadingEl.style.display = 'none';
    contentEl.textContent = `ERROR: ${e.message}`;
    setStatus(statusEl, 'error');
  }
}

// ── Status helpers ───────────────────────────────────────────────────────
function setStatus(el, state) {
  el.className = `panel-status status-${state}`;
  const label = el.querySelector('span:first-child');
  const dot = '<span class="status-dot"></span>';

  switch(state) {
    case 'idle':      label.innerHTML = `${dot}idle`; break;
    case 'streaming': label.innerHTML = `${dot}streaming`; break;
    case 'done':      label.innerHTML = `${dot}complete`; break;
    case 'error':     label.innerHTML = `${dot}error`; break;
  }
}

// ── Init ─────────────────────────────────────────────────────────────────
loadQuestions();
</script>

</body>
</html>
